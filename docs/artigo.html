<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Meta tags preenchidas dinamicamente via JS -->
  <title>Artigo — Venda Exponencial</title>
  <meta name="robots" content="index, follow" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://dizkzzxquztoeqtjkcib.supabase.co" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Venda Exponencial" />
  <link rel="manifest" href="/site.webmanifest" />
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y08K3ESSW7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-Y08K3ESSW7', { send_page_view: true });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 2px solid #FFD700;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #0a0a0a;
      z-index: 100;
    }

    .logo { font-size: 1.6rem; font-weight: 800; color: #FFD700; letter-spacing: -0.5px; }
    .logo span { color: #fff; font-weight: 400; }

    .btn-instagram {
      background: #FFD700; color: #000; font-weight: 700; font-size: 0.9rem;
      padding: 10px 20px; border-radius: 999px; text-decoration: none;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-instagram:hover { opacity: 0.85; }

    .article-wrap { max-width: 780px; margin: 0 auto; padding: 48px 24px 80px; }

    /* Breadcrumb */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; color: #555; margin-bottom: 28px; flex-wrap: wrap;
    }
    .breadcrumb a { color: #FFD700; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { color: #333; }

    .article-img { width: 100%; height: auto; border-radius: 16px; display: block; margin-bottom: 36px; }

    .article-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .fonte-badge { background: #FFD700; color: #000; font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px; }
    .data-text { color: #555; font-size: 0.85rem; }

    h1.article-title { font-size: clamp(1.6rem, 3.5vw, 2.2rem); font-weight: 800; line-height: 1.25; margin-bottom: 32px; color: #fff; }

    .article-body { color: #ccc; line-height: 1.8; font-size: 1.05rem; }
    .article-body p { margin-bottom: 20px; }
    .article-body strong, .article-body b { color: #fff; font-weight: 700; }
    .article-body h2 { color: #FFD700; margin: 36px 0 14px; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 0.5px; border-left: 3px solid #FFD700; padding-left: 12px; }
    .article-body h3 { color: #ddd; margin: 28px 0 10px; font-size: 1rem; font-weight: 700; }
    .article-body ul, .article-body ol { margin: 0 0 20px 24px; }
    .article-body li { margin-bottom: 8px; }

    .divider { border: none; border-top: 1px solid #1e1e1e; margin: 48px 0; }

    .cta-box { background: #111; border: 1px solid #FFD700; border-radius: 16px; padding: 32px; text-align: center; margin-top: 48px; }
    .cta-box p { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .cta-box p em { color: #FFD700; font-style: normal; }
    .cta-box small { display: block; color: #555; font-size: 0.85rem; margin-bottom: 20px; }
    .cta-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn-primary { background: #FFD700; color: #000; font-weight: 700; padding: 12px 24px; border-radius: 999px; text-decoration: none; font-size: 0.95rem; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline { background: transparent; color: #FFD700; border: 1px solid #FFD700; font-weight: 600; padding: 12px 24px; border-radius: 999px; text-decoration: none; font-size: 0.95rem; transition: background 0.2s, color 0.2s; }
    .btn-outline:hover { background: #FFD700; color: #000; }

    .share-bar { display: flex; align-items: center; gap: 10px; margin: 32px 0 0; flex-wrap: wrap; }
    .share-label { font-size: 0.82rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
    .btn-share { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 999px; font-size: 0.88rem; font-weight: 700; cursor: pointer; text-decoration: none; border: none; transition: opacity 0.2s; }
    .btn-share:hover { opacity: 0.85; }
    .btn-share-wa { background: #25D366; color: #fff; }
    .btn-share-li { background: #0A66C2; color: #fff; }
    .btn-share-copy { background: #222; color: #FFD700; border: 1px solid #333; }
    .btn-share-copy.copied { color: #4caf50; border-color: #4caf50; }

    .state { text-align: center; padding: 80px 20px; color: #555; }
    .spinner { width: 40px; height: 40px; border: 3px solid #222; border-top-color: #FFD700; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { border-top: 1px solid #1a1a1a; padding: 30px 40px; text-align: center; color: #444; font-size: 0.85rem; }
    footer a { color: #FFD700; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .logo { font-size: 1.2rem; }
      .article-wrap { padding: 32px 16px 60px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html" style="text-decoration:none">Venda <span>Exponencial</span></a>
  <a class="btn-instagram" href="https://instagram.com/vendaexponencial" target="_blank" rel="noopener">
    ⚡ Seguir no Instagram
  </a>
</header>

<main class="article-wrap" id="content">
  <div class="state">
    <div class="spinner"></div>
    <p>Carregando artigo...</p>
  </div>
</main>

<footer>
  <p>
    Curadoria e análise por
    <a href="https://instagram.com/vendaexponencial" target="_blank" rel="noopener">@vendaexponencial</a>
  </p>
</footer>

<script>
  const SUPABASE_URL = 'https://dizkzzxquztoeqtjkcib.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpemt6enhxdXp0b2VxdGprY2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTYyMzcsImV4cCI6MjA5MDc5MjIzN30.9FslqZBkneQWzpiv6CyASardK_8hoRjzvaaqovdtNAA';
  const BASE_URL = 'https://vendaexponencial.com.br';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function formatDateISO(iso) {
    return iso ? new Date(iso).toISOString() : '';
  }

  function markdownToHtml(text) {
    if (!text) return '';
    return text
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h2>$1</h2>')   // h1 no corpo vira h2 (h1 já é o título)
      .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener sponsored" style="color:#FFD700;text-decoration:underline">$1</a>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .split(/\n{2,}/)
      .map(b => b.trim())
      .filter(Boolean)
      .map(b => /^<h[23]>/.test(b) ? b : `<p>${b.replace(/\n/g, '<br>')}</p>`)
      .join('\n');
  }

  function injectMeta({ title, description, image, slug, pubDate }) {
    const canonical = `${BASE_URL}/artigo.html?slug=${slug}`;

    document.title = `${title} — Venda Exponencial`;

    const setMeta = (sel, attr, val) => {
      let el = document.querySelector(sel);
      if (!el) { el = document.createElement('meta'); document.head.appendChild(el); }
      el.setAttribute(attr, val);
    };

    setMeta('meta[name="description"]',           'content',  description);
    setMeta('meta[name="robots"]',                'content',  'index, follow');
    setMeta('link[rel="canonical"]',              'href',     canonical);

    // Open Graph
    setMeta('meta[property="og:type"]',           'content',  'article');
    setMeta('meta[property="og:site_name"]',      'content',  'Venda Exponencial');
    setMeta('meta[property="og:title"]',          'content',  title);
    setMeta('meta[property="og:description"]',    'content',  description);
    setMeta('meta[property="og:url"]',            'content',  canonical);
    setMeta('meta[property="og:locale"]',         'content',  'pt_BR');
    if (image) setMeta('meta[property="og:image"]', 'content', image);
    if (pubDate) setMeta('meta[property="article:published_time"]', 'content', formatDateISO(pubDate));

    // Twitter
    setMeta('meta[name="twitter:card"]',          'content',  'summary_large_image');
    setMeta('meta[name="twitter:title"]',         'content',  title);
    setMeta('meta[name="twitter:description"]',   'content',  description);
    if (image) setMeta('meta[name="twitter:image"]', 'content', image);

    // Fix canonical link (not meta)
    let link = document.querySelector('link[rel="canonical"]');
    if (!link) { link = document.createElement('link'); link.rel = 'canonical'; document.head.appendChild(link); }
    link.href = canonical;
  }

  function injectJsonLd(data) {
    const slug = data.slug || data.id;
    const pageUrl = `${BASE_URL}/artigo.html?slug=${slug}`;
    const desc = (data.artigo_completo || data.titulo).replace(/[#*\n]/g, ' ').slice(0, 160).trim();
    const keywords = data.titulo
      .replace(/[^a-zA-ZÀ-ú\s]/g, ' ')
      .split(/\s+/)
      .filter(w => w.length > 3)
      .slice(0, 8)
      .join(', ');

    const articleSchema = {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": data.titulo,
      "description": desc,
      "keywords": keywords,
      "image": data.imagem_github || '',
      "datePublished": formatDateISO(data.publicado_em),
      "dateModified": formatDateISO(data.publicado_em),
      "articleSection": data.fonte || 'Ecommerce',
      "about": { "@type": "Thing", "name": data.fonte || 'Ecommerce e Vendas Digitais' },
      "speakable": { "@type": "SpeakableSpecification", "cssSelector": ["h1.article-title", ".article-body p:first-of-type"] },
      "author": {
        "@type": "Organization",
        "name": "Venda Exponencial",
        "url": "https://vendaexponencial.com.br",
        "sameAs": ["https://instagram.com/vendaexponencial"]
      },
      "publisher": {
        "@type": "Organization",
        "name": "Venda Exponencial",
        "url": "https://vendaexponencial.com.br",
        "logo": { "@type": "ImageObject", "url": "https://vendaexponencial.com.br/favicon-96x96.png" },
        "sameAs": ["https://instagram.com/vendaexponencial"]
      },
      "mainEntityOfPage": { "@type": "WebPage", "@id": pageUrl }
    };

    const breadcrumbSchema = {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": `${BASE_URL}/` },
        { "@type": "ListItem", "position": 2, "name": "Notícias", "item": `${BASE_URL}/` },
        { "@type": "ListItem", "position": 3, "name": data.titulo, "item": pageUrl }
      ]
    };

    [articleSchema, breadcrumbSchema].forEach(schema => {
      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.textContent = JSON.stringify(schema);
      document.head.appendChild(script);
    });
  }

  async function loadArtigo() {
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('slug');
    const id     = params.get('id');
    const content = document.getElementById('content');

    if (!slug && !id) {
      content.innerHTML = `<div class="state"><p style="font-size:2rem">⚠️</p><p style="margin-top:12px">Artigo não encontrado.</p><a href="index.html" style="color:#FFD700;display:block;margin-top:16px">← Voltar</a></div>`;
      return;
    }

    let query = sb.from('noticias').select('*');
    query = slug ? query.eq('slug', slug) : query.eq('id', id);
    const { data, error } = await query.single();

    if (error || !data) {
      content.innerHTML = `<div class="state"><p style="font-size:2rem">📭</p><p style="margin-top:12px">Artigo não encontrado.</p><a href="index.html" style="color:#FFD700;display:block;margin-top:16px">← Voltar</a></div>`;
      return;
    }

    // Inject SEO
    const desc = (data.artigo_completo || data.titulo).replace(/[#*\n]/g, ' ').slice(0, 160);
    injectMeta({ title: data.titulo, description: desc, image: data.imagem_github, slug: data.slug || data.id, pubDate: data.publicado_em });
    injectJsonLd(data);

    // Evento: artigo lido
    gtag('event', 'article_view', { article_title: data.titulo, article_source: data.fonte || 'Notícia' });

    const imgHTML = data.imagem_github
      ? `<img class="article-img" src="${data.imagem_github}" alt="${data.titulo}" onerror="this.style.display='none'">`
      : '';

    const artigoHTML = markdownToHtml(data.artigo_completo);
    const igURL = 'https://instagram.com/vendaexponencial';
    const slugVal = data.slug || data.id;
    const pageUrl = `${BASE_URL}/artigo.html?slug=${slugVal}`;

    content.innerHTML = `
      <nav class="breadcrumb" aria-label="breadcrumb">
        <a href="index.html">Home</a>
        <span>›</span>
        <a href="index.html">Notícias</a>
        <span>›</span>
        <span>${data.titulo.slice(0, 60)}${data.titulo.length > 60 ? '…' : ''}</span>
      </nav>

      ${imgHTML}

      <div class="article-meta">
        <span class="fonte-badge">${data.fonte || 'Notícia'}</span>
        <time class="data-text" datetime="${formatDateISO(data.publicado_em)}">${formatDate(data.publicado_em)}</time>
      </div>

      <h1 class="article-title">${data.titulo}</h1>

      <div class="share-bar">
        <span class="share-label">Compartilhar</span>
        <a class="btn-share btn-share-wa" href="https://wa.me/?text=${encodeURIComponent(data.titulo + ' ' + pageUrl)}" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </a>
        <a class="btn-share btn-share-li" href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(pageUrl)}" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </a>
        <button class="btn-share btn-share-copy" onclick="copyLink(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar link
        </button>
      </div>

      <div class="article-body">${artigoHTML}</div>

      <hr class="divider">

      <div class="cta-box">
        <p>Siga <em>@vendaexponencial</em> para mais conteúdo sobre vendas digitais</p>
        <small>Notícias, análises e estratégias para quem vende online no Brasil</small>
        <div class="cta-actions">
          <a class="btn-primary" href="${igURL}" target="_blank" rel="noopener">⚡ Seguir no Instagram</a>
          <a class="btn-outline" href="index.html">← Ver mais notícias</a>
        </div>
      </div>
    `;
  }

  function copyLink(btn) {
    gtag('event', 'share', { method: 'copy_link', content_type: 'article' });
    navigator.clipboard.writeText(window.location.href).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copiado!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar link';
      }, 2500);
    });
  }

  // Rastreamento de scroll de leitura (50% e 100%)
  const scrollMilestones = new Set();
  window.addEventListener('scroll', () => {
    const el = document.getElementById('content');
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const total = el.offsetHeight;
    const scrolled = window.scrollY + window.innerHeight - el.offsetTop;
    const pct = Math.round((scrolled / total) * 100);
    if (pct >= 50 && !scrollMilestones.has(50)) {
      scrollMilestones.add(50);
      gtag('event', 'article_scroll', { scroll_depth: '50%' });
    }
    if (pct >= 100 && !scrollMilestones.has(100)) {
      scrollMilestones.add(100);
      gtag('event', 'article_scroll', { scroll_depth: '100%' });
    }
  }, { passive: true });

  loadArtigo();
</script>
</body>
</html>
