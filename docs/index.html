<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venda Exponencial — Notícias de Ecommerce e Vendas Digitais</title>
  <meta name="description" content="Notícias e análises sobre ecommerce, marketing digital, vendas online e varejo digital no Brasil. Conteúdo atualizado automaticamente para quem vende online." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://vendaexponencial.com.br/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Venda Exponencial" />
  <meta property="og:title" content="Venda Exponencial — Notícias de Ecommerce e Vendas Digitais" />
  <meta property="og:description" content="Notícias e análises sobre ecommerce, marketing digital e vendas online no Brasil." />
  <meta property="og:url" content="https://vendaexponencial.com.br/" />
  <meta property="og:locale" content="pt_BR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Venda Exponencial — Notícias de Ecommerce" />
  <meta name="twitter:description" content="Notícias e análises sobre ecommerce, marketing digital e vendas online no Brasil." />

  <!-- JSON-LD WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Venda Exponencial",
    "url": "https://vendaexponencial.com.br/",
    "description": "Notícias e análises sobre ecommerce, marketing digital e vendas digitais no Brasil",
    "publisher": {
      "@type": "Organization",
      "name": "Venda Exponencial",
      "sameAs": "https://instagram.com/vendaexponencial"
    }
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 2px solid #FFD700;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #0a0a0a;
      z-index: 100;
    }

    .logo { font-size: 1.6rem; font-weight: 800; color: #FFD700; letter-spacing: -0.5px; }
    .logo span { color: #fff; font-weight: 400; }

    .btn-instagram {
      background: #FFD700;
      color: #000;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 20px;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-instagram:hover { opacity: 0.85; }

    .hero { text-align: center; padding: 60px 20px 40px; }
    .hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.2; }
    .hero h1 em { color: #FFD700; font-style: normal; }
    .hero p { color: #999; margin-top: 12px; font-size: 1rem; }

    .grid-section { max-width: 1200px; margin: 0 auto; padding: 20px 24px 60px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: #FFD700; transform: translateY(-3px); }

    .card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #1a1a1a; display: block; }
    .card-img-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a1a, #111);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
    }

    .card-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .card-fonte { font-size: 0.75rem; color: #FFD700; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .card-data { font-size: 0.75rem; color: #555; margin-left: auto; white-space: nowrap; }
    .card-title { font-size: 1rem; font-weight: 700; line-height: 1.4; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-btn { margin-top: 16px; display: inline-block; background: transparent; border: 1px solid #FFD700; color: #FFD700; font-size: 0.8rem; font-weight: 600; padding: 8px 16px; border-radius: 999px; text-align: center; transition: background 0.2s, color 0.2s; }
    .card:hover .card-btn { background: #FFD700; color: #000; }

    .state { text-align: center; padding: 80px 20px; color: #555; }
    .state .spinner { width: 40px; height: 40px; border: 3px solid #222; border-top-color: #FFD700; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { border-top: 1px solid #1a1a1a; padding: 30px 40px; text-align: center; color: #444; font-size: 0.85rem; }
    footer a { color: #FFD700; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .logo { font-size: 1.2rem; }
      .hero { padding: 40px 16px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Venda <span>Exponencial</span></div>
  <a class="btn-instagram" href="https://instagram.com/vendaexponencial" target="_blank" rel="noopener">
    ⚡ Seguir no Instagram
  </a>
</header>

<section class="hero">
  <h1>Notícias de <em>Ecommerce</em> e<br>Vendas Digitais</h1>
  <p>Conteúdo atualizado automaticamente para quem vende online no Brasil</p>
</section>

<section class="grid-section">
  <div id="grid" class="grid">
    <div class="state" id="loading" style="grid-column:1/-1">
      <div class="spinner"></div>
      <p>Carregando notícias...</p>
    </div>
  </div>
</section>

<footer>
  <p>
    Feito com ⚡ por
    <a href="https://instagram.com/vendaexponencial" target="_blank" rel="noopener">@vendaexponencial</a>
    &nbsp;·&nbsp; Conteúdo gerado automaticamente por IA
    &nbsp;·&nbsp; <a href="sitemap.xml">Sitemap</a>
  </p>
</footer>

<script>
  const SUPABASE_URL = 'https://dizkzzxquztoeqtjkcib.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpemt6enhxdXp0b2VxdGprY2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTYyMzcsImV4cCI6MjA5MDc5MjIzN30.9FslqZBkneQWzpiv6CyASardK_8hoRjzvaaqovdtNAA';
  const BASE_URL = 'https://vendaexponencial.com.br';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function artigoHref(n) {
    return n.slug ? `artigo.html?slug=${n.slug}` : `artigo.html?id=${n.id}`;
  }

  function cardHTML(n) {
    const href = artigoHref(n);
    const img = n.imagem_github
      ? `<img class="card-img" src="${n.imagem_github}" alt="${n.titulo}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="card-img-placeholder" ${n.imagem_github ? 'style="display:none"' : ''}>📰</div>`;

    return `
      <a class="card" href="${href}">
        ${img}${placeholder}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-fonte">${n.fonte || 'Notícia'}</span>
            <span class="card-data">${formatDate(n.publicado_em)}</span>
          </div>
          <div class="card-title">${n.titulo}</div>
          <span class="card-btn">Ler artigo completo →</span>
        </div>
      </a>`;
  }

  async function loadNoticias() {
    const { data, error } = await sb
      .from('noticias')
      .select('id, titulo, slug, fonte, imagem_github, publicado_em')
      .order('publicado_em', { ascending: false })
      .limit(20);

    const grid = document.getElementById('grid');

    if (error || !data || data.length === 0) {
      grid.innerHTML = `<div class="state" style="grid-column:1/-1">
        <p style="font-size:2rem">📭</p>
        <p style="margin-top:12px">Nenhuma notícia publicada ainda.</p>
      </div>`;
      return;
    }

    grid.innerHTML = data.map(cardHTML).join('');
  }

  loadNoticias();
</script>
</body>
</html>
